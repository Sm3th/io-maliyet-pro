<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="#0f172a"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="120" y2="60" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="120" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <!-- I letter - clean vertical bar with dots -->
  <rect x="27" y="32" width="8" height="56" rx="4" fill="url(#grad)"/>
  <rect x="19" y="32" width="24" height="8" rx="4" fill="url(#grad)"/>
  <rect x="19" y="80" width="24" height="8" rx="4" fill="url(#grad)"/>
  <!-- O letter - clean ring -->
  <circle cx="78" cy="60" r="22" fill="none" stroke="url(#grad2)" stroke-width="8"/>
  <!-- Corner accent -->
  <circle cx="104" cy="16" r="4" fill="#0ea5e9" opacity="0.5"/>
  <circle cx="16" cy="104" r="4" fill="#6366f1" opacity="0.5"/>
</svg>
